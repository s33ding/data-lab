---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: default
data:
  # Retrieve actual values from the old cluster:
  # kubectl --context sa-east-1-cluster get configmap postgres-config -n default -o yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: default
data:
  # Retrieve actual values from the old cluster:
  # kubectl --context sa-east-1-cluster get configmap postgres-init -n default -o yaml
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
# NOTE: The postgres deployment was not found running on the old cluster.
# The airflow namespace had a postgres service and a stuck migration job.
# You may need to redeploy postgres separately.
