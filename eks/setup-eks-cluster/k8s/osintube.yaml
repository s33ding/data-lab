---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osintube-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::248189947068:role/osintube-readonly-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osintube-app
  namespace: default
  labels:
    app: osintube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osintube
  template:
    metadata:
      labels:
        app: osintube
    spec:
      serviceAccountName: osintube-sa
      containers:
      - name: osintube
        image: 248189947068.dkr.ecr.us-east-1.amazonaws.com/osintube:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        env:
        - name: AWS_REGION
          value: us-east-1
        - name: SECRET_NAME
          value: osintube-secrets
        - name: STREAMLIT_BROWSER_SERVER_ADDRESS
          value: app.dataiesb.com
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /osintube/_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /osintube/_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: osintube-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: osintube
  ports:
  - port: 80
    targetPort: 8501
