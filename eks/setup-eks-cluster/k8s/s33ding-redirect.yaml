---
apiVersion: v1
kind: ConfigMap
metadata:
  name: s33ding-redirect-config
  namespace: default
data:
  default.conf: |
    server {
      listen 80;
      location / {
        return 301 https://s33ding-progress.s3.amazonaws.com/index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s33ding-redirect
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s33ding-redirect
  template:
    metadata:
      labels:
        app: s33ding-redirect
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: config
        configMap:
          name: s33ding-redirect-config
---
apiVersion: v1
kind: Service
metadata:
  name: s33ding-redirect
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: s33ding-redirect
  ports:
  - port: 80
    targetPort: 80
